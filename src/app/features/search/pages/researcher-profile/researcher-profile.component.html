<app-landing-header></app-landing-header>

<div class="page-container" *ngIf="isLoading">
    <div class="loading-spinner-wrapper">
        <div class="spinner"></div>
        <p>Cargando perfil del investigador...</p>
    </div>
</div>

<div class="page-container" *ngIf="!isLoading">
    <div class="breadcrumb-row">
        <a routerLink="/search" class="back-link">
            <span class="icon">‹</span> Ir al buscador
        </a>
    </div>

    <div class="cv-wrapper-card">
        <!-- Reusable CV Component -->
        <app-researcher-cv [researcher]="researcher" [generalData]="generalData" [academicFormation]="academicFormation"
            [technicalFormation]="technicalFormation" [workExperience]="workExperience"
            [docenteExperience]="docenteExperience" [ctiManagementExperience]="ctiManagementExperience"
            [boardExperience]="boardExperience" [projects]="projects" [scientificProduction]="scientificProduction"
            [languages]="languages" [thesisAdvisory]="thesisAdvisory" [thesisJury]="thesisJury"></app-researcher-cv>
    </div>
</div>

<app-footer></app-footer>
